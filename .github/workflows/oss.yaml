name: OSS Vulnerabilities Remediation Workflow

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "The branch to scan and remediate"
        type: string
        required: true
        default: "main"

permissions:
  contents: read
  security-events: read
  pull-requests: write
  issues: write

jobs:

  # JOB 1: Scan agent
  scan-agent:
    name: Scan agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: List repository contents (audit log)
        run: |
          echo "## Repository file listing for branch: ${{ inputs.target_branch }}"
          echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "---------------------------------------------"
          find . -maxdepth 3 -not -path '*/.git*' | sort

  # JOB 2: Triage agent
  triage-agent:
    name: Triage agent
    runs-on: ubuntu-latest
    needs: scan-agent
    outputs:
      has_findings: ${{ steps.triage.outputs.has_findings }}
    env:
      GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Fetch and triage Dependabot alerts
        id: triage
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          echo "Fetching open Dependabot alerts for $REPO ..."
          if ! gh api \
                --paginate \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/dependabot/alerts?state=open&per_page=100" \
                > raw_alerts.json 2> fetch_error.log; then
            echo "::warning::Could not fetch Dependabot alerts (see fetch_error.log)."
            cat fetch_error.log || true
            echo "# Triage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "Could not fetch Dependabot alerts. Check that Dependabot alerts are enabled and the token has access." >> "$GITHUB_STEP_SUMMARY"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --paginate emits one JSON array per page; `jq -s 'add'` slurps
          # all those arrays into a single flat array.
          jq -s 'add' raw_alerts.json > alerts.json
          ALERT_COUNT=$(jq 'length' alerts.json)

          if [ "$ALERT_COUNT" -eq 0 ]; then
            echo "No vulnerabilities found."
            echo "# Triage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "No open Dependabot alerts found for ${{ inputs.target_branch }}." >> "$GITHUB_STEP_SUMMARY"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $ALERT_COUNT open alert(s). Extracting fields and sorting by CVSS score..."

          # --- CVSS extraction, in order of preference ---
          # GitHub populates CVSS in different fields depending on the
          # advisory's age and scoring source:
          #   1. security_advisory.cvss.score                      (legacy)
          #   2. security_advisory.cvss_severities.cvss_v4.score   (newest)
          #   3. security_advisory.cvss_severities.cvss_v3.score   (common fallback)
          #
          # THE BUG WE FIXED: jq's `//` operator only falls through on
          # `null` or `false` -- NOT on `0`. Many advisories carry a real,
          # populated "score": 0 in the legacy field (an explicit
          # "unscored" placeholder) while the actual score sits in the
          # v3/v4 field. `0 // "N/A"` evaluates to 0, so a naive chain
          # stops at the first field and never checks further.
          #
          # THE FIX: extract each candidate into a variable, then
          # explicitly test `> 0` (not just "exists") before accepting
          # it. Only when every candidate is null/0 do we fall through
          # to "N/A".
          jq '
            map(
              (.security_advisory.cvss.score // 0) as $legacy
              | (.security_advisory.cvss_severities.cvss_v4.score // 0) as $v4
              | (.security_advisory.cvss_severities.cvss_v3.score // 0) as $v3
              | {
                  component:    (.security_vulnerability.package.name // "unknown"),
                  cve_id:       (.security_advisory.cve_id // "N/A"),
                  severity:     (.security_vulnerability.severity // "unknown"),
                  cvss:         (
                                  if $legacy > 0 then $legacy
                                  elif $v4 > 0 then $v4
                                  elif $v3 > 0 then $v3
                                  else "N/A"
                                  end
                                ),
                  cvss_version: (
                                  if $legacy > 0 then "legacy"
                                  elif $v4 > 0 then "v4"
                                  elif $v3 > 0 then "v3"
                                  else "unscored"
                                  end
                                ),
                  fixed_version: (.security_vulnerability.first_patched_version.identifier // "No fix available"),
                  fix_available: (.security_vulnerability.first_patched_version != null),
                  html_url:      (.html_url // ""),
                  number:        (.number)
                }
            )
            # sort_by needs a comparable numeric value; treat "N/A" as
            # lowest priority (-1) for ordering purposes only -- the
            # displayed value stays "N/A", this only affects sort order.
            | sort_by(if .cvss == "N/A" then -1 else .cvss end)
            | reverse
          ' alerts.json > sorted_alerts.json

          echo "has_findings=true" >> "$GITHUB_OUTPUT"

          # --- Build Markdown table for step summary + stdout ---
          {
            echo "# Dependabot Triage Summary"
            echo ""
            echo "Branch: ${{ inputs.target_branch }} -- Total open alerts: $ALERT_COUNT"
            echo ""
            echo "| Component | CVE ID | Severity | CVSS | Score Source | Fixed Version | Link |"
            echo "|---|---|---|---|---|---|---|"
          } > summary_table.md

          jq -r '.[] | [.component, .cve_id, .severity, (.cvss|tostring), .cvss_version, .fixed_version, .html_url] | @tsv' sorted_alerts.json |
          while IFS=$'\t' read -r component cve severity cvss cvss_version fixed_version url; do
            echo "| $component | $cve | $severity | $cvss | $cvss_version | $fixed_version | [link]($url) |" >> summary_table.md
          done

          cat summary_table.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "================ TRIAGE RESULTS (CVSS DESC) ================"
          cat summary_table.md
          echo "=============================================================="

      - name: Upload triage artifacts
        if: steps.triage.outputs.has_findings == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-triage
          path: |
            sorted_alerts.json
            summary_table.md
          retention-days: 14

  # JOB 3: Remediation agent
  remediation-agent:
    name: Remediation agent
    runs-on: ubuntu-latest
    needs: triage-agent
    if: needs.triage-agent.outputs.has_findings == 'true'
    env:
      GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Download triage artifacts
        uses: actions/download-artifact@v4
        with:
          name: dependabot-triage

      - name: Remediate High/Critical alerts via Dependabot PRs
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Filter to only High/Critical from the already-sorted list.
          jq '[.[] | select(.severity == "critical" or .severity == "high")]' \
            sorted_alerts.json > critical_high.json

          COUNT=$(jq 'length' critical_high.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "No High or Critical vulnerabilities found. Nothing to remediate."
            echo "# Remediation Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "No High/Critical severity alerts -- no remediation action needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Found $COUNT High/Critical alert(s) to remediate."
          {
            echo "# Remediation Summary"
            echo ""
            echo "| Component | CVE ID | Severity | Alert # | Action Taken |"
            echo "|---|---|---|---|---|"
          } > remediation_table.md

          while IFS=$'\t' read -r component cve severity cvss fixed_version fix url number; do

            # ------------------------------------------------------------------
            # STEP 1: Check whether Dependabot has already opened a PR for this
            #         alert.  Dependabot PR branches follow the pattern
            #         "dependabot/<ecosystem>/<package>-<version>", so a title
            #         search on the component name is a reliable proxy.
            # ------------------------------------------------------------------
            EXISTING_PR=$(gh pr list \
              --repo "$REPO" \
              --state open \
              --search "$component in:title" \
              --json number,title,url \
              --jq '.[0] // empty' 2>/dev/null || echo "")

            if [ -n "$EXISTING_PR" ]; then
              # ----------------------------------------------------------------
              # A Dependabot PR already exists -- nothing more to do.
              # ----------------------------------------------------------------
              PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
              ACTION="Dependabot PR already open: $PR_URL"
              echo "[$severity] $component ($cve): $ACTION"

            elif [ "$fix" = "true" ]; then
              # ----------------------------------------------------------------
              # No PR yet, but a patched version exists.
              #
              # Strategy: trigger Dependabot to open a security-update PR by
              # cycling the alert state (dismiss → reopen).  GitHub's internal
              # Dependabot scheduler re-evaluates every open alert that has an
              # available fix; reopening an alert that was in a transient
              # "dismissed" state is the documented way to force a fresh run
              # without waiting for the next scheduled sweep.
              #
              # Why not a direct "create PR" API call?
              #   GitHub does not expose a public REST endpoint to imperatively
              #   request a Dependabot security-update PR for a specific alert.
              #   The dismiss→reopen cycle is the closest supported primitive.
              #
              # Prerequisites (must be configured on the repository):
              #   • Dependabot alerts        -- enabled
              #   • Dependabot security updates -- enabled  (Settings → Code
              #     security → Dependabot security updates)
              #   • DEPENDABOT_PAT has `security_events` scope (read/write)
              # ----------------------------------------------------------------

              echo "[$severity] $component ($cve): No open PR found. Triggering Dependabot via alert #${number} state cycle..."

              # --- Dismiss the alert (tolerable_risk is a neutral reason) ---
              DISMISS_HTTP=$(gh api \
                --method PATCH \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${REPO}/dependabot/alerts/${number}" \
                -f state="dismissed" \
                -f dismissed_reason="tolerable_risk" \
                -f dismissed_comment="Auto-dismissed by remediation workflow to trigger a fresh Dependabot security-update PR. Will be reopened immediately." \
                --jq '.state' 2>/dev/null || echo "error")

              if [ "$DISMISS_HTTP" != "dismissed" ]; then
                # Dismissal failed (e.g. token lacks security_events write
                # scope, or Dependabot security updates are not enabled).
                # Fall back to a plain comment on the alert URL so the team
                # is notified without losing the alert.
                ACTION="Could not dismiss alert #${number} to trigger PR (check token scope / Dependabot security updates setting). Manual fix required: update ${component} to ${fixed_version}. Alert: ${url}"
                echo "::warning::[$severity] $component ($cve): $ACTION"
              else
                # --- Immediately reopen the alert ---
                REOPEN_HTTP=$(gh api \
                  --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "/repos/${REPO}/dependabot/alerts/${number}" \
                  -f state="open" \
                  --jq '.state' 2>/dev/null || echo "error")

                if [ "$REOPEN_HTTP" = "open" ]; then
                  ACTION="Dependabot PR triggered via alert #${number} state cycle (dismiss → reopen). PR will appear shortly. Fix: ${component} → ${fixed_version}. Alert: ${url}"
                  echo "[$severity] $component ($cve): $ACTION"
                else
                  # Reopen failed -- alert is currently dismissed. Emit a
                  # warning so an operator can reopen it manually.
                  ACTION="Alert #${number} dismissed but could not be reopened automatically. Please reopen manually to trigger Dependabot PR. Alert: ${url}"
                  echo "::warning::[$severity] $component ($cve): $ACTION"
                fi
              fi

            else
              # ----------------------------------------------------------------
              # No fix is available upstream yet -- nothing Dependabot can do.
              # Log for visibility; no state change performed.
              # ----------------------------------------------------------------
              ACTION="No upstream fix available -- monitoring only. Alert: ${url}"
              echo "[$severity] $component ($cve): $ACTION"
            fi

            echo "| $component | $cve | $severity | #${number} | $ACTION |" >> remediation_table.md

          done < <(jq -r '.[] | [.component, .cve_id, .severity, (.cvss|tostring), .fixed_version, .fix_available, .html_url, .number] | @tsv' critical_high.json)

          cat remediation_table.md >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "================ REMEDIATION RESULTS ================"
          cat remediation_table.md
          echo "======================================================="
