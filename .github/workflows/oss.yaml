# .github/workflows/oss.yml
#
# 3-stage security pipeline: Scan -> Triage -> Remediate
# Manual trigger only. Each job depends on the previous via `needs`.
#
# IMPORTANT CAVEAT (read before relying on Job 3):
# GitHub does not expose an API/CLI call to force-create a Dependabot
# security-update PR on demand. Those PRs are generated automatically by
# GitHub's backend the moment a Dependabot alert is created, IF:
#   - Dependabot security updates are enabled for the repo
#     (Settings -> Code security -> Dependabot security updates), and
#   - Dependabot is able to compute a safe upgrade path.
# This pipeline cannot bypass that. What it CAN do, and does below, is:
#   1. Detect High/Critical alerts that already have an auto-fix PR open
#      (via `gh pr list`) and report them.
#   2. For High/Critical alerts that have NO PR yet, open a tracking
#      GitHub Issue assigned for follow-up, since the only real ways to
#      force generation are: (a) re-running dependency graph re-scan via
#      Settings, or (b) using the REST endpoint
#      POST /repos/{owner}/{repo}/dependabot/alerts/{alert_number}
#      to set/confirm the alert state, which can nudge re-evaluation but
#      is NOT a guaranteed "create PR now" button.

name: OSS Vulnerabilities Remediation Workflow

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "The branch to scan and remediate"
        type: string
        required: true
        default: "main"

permissions:
  contents: read
  security-events: read
  pull-requests: write
  issues: write 

jobs:

  # JOB 1: Scan agent
  scan-agent:
    name: Scan agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: List repository contents (audit log)
        run: |
          echo "## Repository file listing for branch: ${{ inputs.target_branch }}"
          echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "---------------------------------------------"
          # -maxdepth 3 keeps the listing readable on large repos;
          # increase if you need deeper visibility.
          find . -maxdepth 3 -not -path '*/.git*' | sort

  # JOB 2: Triage agent
  triage-agent:
    name: Triage agent
    runs-on: ubuntu-latest
    needs: scan-agent
    outputs:
      has_findings: ${{ steps.triage.outputs.has_findings }}
    env:
      GH_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Fetch and triage Dependabot alerts
        id: triage
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          echo "Fetching open Dependabot alerts for $REPO ..."

          if ! gh api \
                --paginate \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/dependabot/alerts?state=open&per_page=100" \
                > raw_alerts.json 2> fetch_error.log; then
            echo "::warning::Could not fetch Dependabot alerts (see fetch_error.log)."
            cat fetch_error.log || true
            echo "# Triage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "Could not fetch Dependabot alerts. Check that Dependabot alerts are enabled and the token has access." >> "$GITHUB_STEP_SUMMARY"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --paginate emits one JSON array per page; `jq -s 'add'` slurps
          # all those arrays into a single flat array.
          jq -s 'add' raw_alerts.json > alerts.json

          ALERT_COUNT=$(jq 'length' alerts.json)

          if [ "$ALERT_COUNT" -eq 0 ]; then
            echo "No vulnerabilities found."
            echo "# Triage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ No open Dependabot alerts found for \`${{ inputs.target_branch }}\`." >> "$GITHUB_STEP_SUMMARY"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $ALERT_COUNT open alert(s). Extracting fields and sorting by CVSS score..."

          # --- CVSS extraction, in order of preference ---
          # GitHub populates CVSS in one of several places depending on
          # when/how the advisory was created:
          #   1. security_advisory.cvss.score          (legacy, older advisories)
          #   2. security_advisory.cvss_severities.cvss_v4.score  (newest)
          #   3. security_advisory.cvss_severities.cvss_v3.score  (common fallback)
          # Reading ONLY field #1 is what caused scores to show as 0 —
          # alerts that only populate v3/v4 had a null legacy field, and
          # the old `// 0` fallback silently substituted a fake zero.
          # The `//` chain below tries each in order and only falls back
          # to "N/A" if every one of them is genuinely null/missing.
          #
          # Fixed version extraction:
          #   security_vulnerability.first_patched_version.identifier
          # is null when no patch exists yet — we surface that explicitly
          # as "No fix available" rather than leaving it blank.
          jq '
            map({
              component:      (.security_vulnerability.package.name // "unknown"),
              cve_id:         (.security_advisory.cve_id // "N/A"),
              severity:       (.security_vulnerability.severity // "unknown"),
              cvss:           (
                                .security_advisory.cvss.score
                                // .security_advisory.cvss_severities.cvss_v4.score
                                // .security_advisory.cvss_severities.cvss_v3.score
                                // "N/A"
                              ),
              cvss_version:    (
                                if .security_advisory.cvss.score != null then "legacy"
                                elif .security_advisory.cvss_severities.cvss_v4.score != null then "v4"
                                elif .security_advisory.cvss_severities.cvss_v3.score != null then "v3"
                                else "unknown"
                                end
                              ),
              fixed_version:   (.security_vulnerability.first_patched_version.identifier // "No fix available"),
              fix_available:   (.security_vulnerability.first_patched_version != null),
              html_url:        (.html_url // ""),
              number:          (.number)
            })
            # sort_by needs a numeric value, so coerce "N/A" to -1 just
            # for ordering purposes without losing the "N/A" display value
            | sort_by(if .cvss == "N/A" then -1 else .cvss end)
            | reverse
          ' alerts.json > sorted_alerts.json

          echo "has_findings=true" >> "$GITHUB_OUTPUT"

          # --- Build Markdown table for step summary + stdout ---
          {
            echo "# 🔍 Dependabot Triage Summary"
            echo ""
            echo "Branch: \`${{ inputs.target_branch }}\` • Total open alerts: **$ALERT_COUNT**"
            echo ""
            echo "| Component | CVE ID | Severity | CVSS | Score Source | Fixed Version | Link |"
            echo "|---|---|---|---|---|---|---|"
          } > summary_table.md

          jq -r '.[] | [.component, .cve_id, .severity, .cvss, .cvss_version, .fixed_version, .html_url] | @tsv' sorted_alerts.json |
          while IFS=$'\t' read -r component cve severity cvss cvss_version fixed_version url; do
            echo "| $component | $cve | $severity | $cvss | $cvss_version | $fixed_version | [link]($url) |" >> summary_table.md
          done

          cat summary_table.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "================ TRIAGE RESULTS (CVSS DESC) ================"
          cat summary_table.md
          echo "=============================================================="

      - name: Upload triage artifacts
        if: steps.triage.outputs.has_findings == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependabot-triage
          path: |
            sorted_alerts.json
            summary_table.md
          retention-days: 14

  # JOB 3: Remediation agent
  remediation-agent:
    name: Remediation agent
    runs-on: ubuntu-latest
    needs: triage-agent
    if: needs.triage-agent.outputs.has_findings == 'true'
    env:
      GH_TOKEN: ${{ secrets.DEPENDABOT_PAT}}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Download triage artifacts
        uses: actions/download-artifact@v4
        with:
          name: dependabot-triage

      - name: Remediate High/Critical alerts
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Filter to only High/Critical from the already-sorted list.
          jq '[.[] | select(.severity == "critical" or .severity == "high")]' \
            sorted_alerts.json > critical_high.json

          COUNT=$(jq 'length' critical_high.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "No High or Critical vulnerabilities found. Nothing to remediate."
            echo "# Remediation Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ No High/Critical severity alerts — no remediation action needed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Found $COUNT High/Critical alert(s) to remediate."
          {
            echo "# 🛠️ Remediation Summary"
            echo ""
            echo "| Component | CVE ID | Severity | Action Taken |"
            echo "|---|---|---|---|"
          } > remediation_table.md

          while IFS=$'\t' read -r component cve severity cvss fix url number; do

            EXISTING_PR=$(gh pr list \
              --repo "$REPO" \
              --state open \
              --search "$component in:title" \
              --json number,title,url \
              --jq '.[0] // empty' 2>/dev/null || echo "")

            if [ -n "$EXISTING_PR" ]; then
              PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
              ACTION="Existing Dependabot PR found: $PR_URL"
              echo "[$severity] $component ($cve): $ACTION"
            elif [ "$fix" = "true" ]; then
              # A patched version exists but no PR yet — open a tracking
              # issue rather than fabricate a PR action that doesn't exist.
              ISSUE_URL=$(gh issue create \
                --repo "$REPO" \
                --title "[Security][$severity] Remediate $component ($cve)" \
                --body "Dependabot alert #$number flags **$component** as **$severity** (CVSS $cvss) with a known fix available, but no automated PR currently exists on \`${{ inputs.target_branch }}\`.

### Suggested next steps:
# 1. Confirm Dependabot security updates are enabled: repo Settings → Code security → Dependabot security updates.
# 2. If enabled and still no PR after the next scheduled scan, bump \`$component\` manually to the patched version referenced in: $url
# 3. Alert reference: $url" \
#                 --label "security" 2>/dev/null || echo "")
#               ACTION="No PR found; tracking issue opened: ${ISSUE_URL:-failed to create}"
#               echo "[$severity] $component ($cve): $ACTION"
#             else
#               ACTION="No fix currently available upstream — monitoring only."
#               echo "[$severity] $component ($cve): $ACTION"
#             fi

#             echo "| $component | $cve | $severity | $ACTION |" >> remediation_table.md

#           done < <(jq -r '.[] | [.component, .cve_id, .severity, .cvss, .fix_available, .html_url, .number] | @tsv' critical_high.json)

